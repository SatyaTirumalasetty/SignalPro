name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: signalpro_test
          POSTGRES_USER: signalpro
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npx eslint src/ --max-warnings 0

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://signalpro:test_password@localhost:5432/signalpro_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long
          ENCRYPTION_KEY: test-encryption-key-minimum-32-chars
          ANTHROPIC_API_KEY: test-key
        run: npm test -- --coverage --forceExit

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: signalpro-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: signalpro-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sonarqube:
    name: SonarQube Scan & Quality Gate
    runs-on: ubuntu-latest
    needs: test
    # Requires repo secrets SONARTOKEN and SONARHOSTURL pointing at your
    # SonarQube/SonarCloud instance. Given the financial/compliance nature of
    # this app, the quality gate failing MUST fail the build — no soft-fail.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests with coverage (for Sonar import)
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://signalpro:test_password@localhost:5432/signalpro_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long
          ENCRYPTION_KEY: test-encryption-key-minimum-32-chars
          ANTHROPIC_API_KEY: test-key
        run: npm test -- --coverage --forceExit
        continue-on-error: true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONARTOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARHOSTURL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONARTOKEN }}
        # No continue-on-error / soft-fail: a red quality gate must block merge.

  dependency-scan:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Free, self-serve SCA scan of backend + frontend dependency trees
      # (package-lock.json) for known vulnerabilities. For a financial
      # trading platform, treat any fixable CRITICAL/HIGH vulnerability as
      # a release blocker — no continue-on-error/soft-fail.
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
          version: 'v0.70.0'
