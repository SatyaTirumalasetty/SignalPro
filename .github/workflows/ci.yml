name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: signalpro_test
          POSTGRES_USER: signalpro
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npx eslint src/ --max-warnings 0 || true

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://signalpro:test_password@localhost:5432/signalpro_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long
          ENCRYPTION_KEY: test-encryption-key-minimum-32-chars
          ANTHROPIC_API_KEY: test-key
        run: npm test -- --coverage --forceExit

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: signalpro-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sonarqube:
    name: SonarQube Scan & Quality Gate
    runs-on: ubuntu-latest
    needs: test
    # Requires repo secrets SONAR_TOKEN and SONAR_HOST_URL pointing at your
    # SonarQube/SonarCloud instance. Given the financial/compliance nature of
    # this app, the quality gate failing MUST fail the build — no soft-fail.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests with coverage (for Sonar import)
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://signalpro:test_password@localhost:5432/signalpro_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long
          ENCRYPTION_KEY: test-encryption-key-minimum-32-chars
          ANTHROPIC_API_KEY: test-key
        run: npm test -- --coverage --forceExit
        continue-on-error: true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # No continue-on-error / soft-fail: a red quality gate must block merge.

  blackduck:
    name: Black Duck SCA Scan
    runs-on: ubuntu-latest
    needs: test
    # Requires repo secrets BLACKDUCK_URL and BLACKDUCK_API_TOKEN pointing at
    # your Black Duck Hub. Scans both backend and frontend dependency trees for
    # known vulnerabilities and license-policy violations. Verify the action
    # name/version against your Black Duck tenant's current integration docs —
    # Synopsys/Black Duck has rebranded its scanning tooling more than once.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Black Duck Full Scan
        uses: blackduck-inc/black-duck-security-scan@v2
        env:
          BLACKDUCK_URL: ${{ secrets.BLACKDUCK_URL }}
          BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
        with:
          blackducksca_scan_full: true
          # Block the build on policy violations of these severities — for a
          # financial trading platform, treat any known-vulnerable or
          # disallowed-license dependency as a release blocker.
          blackducksca_scan_failure_severities: 'BLOCKER,CRITICAL,HIGH'
