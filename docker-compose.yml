version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: signalpro
      POSTGRES_USER: signalpro
      POSTGRES_PASSWORD: signalpro_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run on first init only (fresh data dir), in lexical order — base schema then migrations.
      # Adding a new file under database/migrations/ requires a new line here to seed fresh DBs;
      # existing DBs pick it up via `npm run migrate` (backend/src/database/migrate.js) instead.
      - ./database/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./database/migrations/001_phase1_additions.sql:/docker-entrypoint-initdb.d/01-001_phase1_additions.sql:ro
      - ./database/migrations/002_phase2_additions.sql:/docker-entrypoint-initdb.d/02-002_phase2_additions.sql:ro
      - ./database/migrations/003_users_role_column.sql:/docker-entrypoint-initdb.d/03-003_users_role_column.sql:ro
      - ./database/migrations/004_support_ticket_assigned_to_fk.sql:/docker-entrypoint-initdb.d/04-004_support_ticket_assigned_to_fk.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalpro -d signalpro"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://signalpro:signalpro_dev_password@postgres:5432/signalpro
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (static build served by Nginx) ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runner
      args:
        VITE_API_BASE_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
