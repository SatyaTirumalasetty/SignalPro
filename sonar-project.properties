# SonarQube / SonarCloud project configuration for SignalPro Enterprise.
# Required CI secrets: SONAR_TOKEN, SONAR_HOST_URL (see .github/workflows/ci.yml).
# SONAR_HOST_URL should be https://sonarcloud.io for SonarCloud.

sonar.projectKey=SatyaTirumalasetty_SignalPro
sonar.projectName=SignalPro Enterprise
sonar.organization=satyatirumalasetty

sonar.sourceEncoding=UTF-8

# Analyze both backend (Express/Node) and frontend (React/TS) source trees.
sonar.sources=backend/src,frontend/src
sonar.tests=backend/src/__tests__
sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.config.js,**/*.config.ts
sonar.coverage.exclusions=**/__tests__/**,**/*.test.*,**/*.spec.*,**/migrations/**,frontend/src/types/**

# Backend coverage (Jest, lcov reporter — see backend/package.json "coverageReporters").
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info
